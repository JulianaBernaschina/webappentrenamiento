<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test de hábitos</title>
</head>
<body>

  <p id="paso"></p>
  <p id="pregunta"></p>
  <div id="opciones"></div>
  <button id="btn" disabled onclick="siguiente()">Siguiente</button>

  <div id="resultado" style="display:none">
    <p id="res-titulo"></p>
    <p id="res-desc"></p>
    <button onclick="reiniciar()">Volver a empezar</button>
  </div>

  <script>
    const preguntas = [
      { q: "¿A qué hora te despertás?", opts: ["Antes de las 7am", "Entre 8 y 10am", "Después de las 10am"] },
      { q: "¿Cómo es tu alimentación?", opts: ["Saludable casi siempre", "Mitad y mitad", "Sin orden"] },
      { q: "¿Hacés actividad física?", opts: ["Varios días por semana", "De vez en cuando", "Casi nunca"] },
      { q: "¿Cómo usás tu tiempo libre?", opts: ["Con intención", "Mezcla de todo", "Scrolleando sin parar"] },
      { q: "¿Qué hacés antes de dormir?", opts: ["Rutina sin pantallas", "A veces pantalla", "Pantalla hasta dormirme"] }
    ];

    const resultados = {
      bien:  { t: "Hábitos sólidos",         d: "Tenés consistencia. Seguí construyendo." },
      mal:   { t: "Hábitos en construcción", d: "Elegí un hábito y empezá esta semana." }
    };

    let actual = 0, puntaje = [], elegido = null;

    function mostrar() {
      document.getElementById('paso').textContent = "Pregunta " + (actual + 1) + " de " + preguntas.length;
      document.getElementById('pregunta').textContent = preguntas[actual].q;
      const div = document.getElementById('opciones');
      div.innerHTML = '';
      preguntas[actual].opts.forEach((op, i) => {
        const btn = document.createElement('button');
        btn.textContent = op;
        btn.onclick = () => { elegido = i; document.getElementById('btn').disabled = false; };
        div.appendChild(btn);
        div.appendChild(document.createElement('br'));
      });
      elegido = null;
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = actual === preguntas.length - 1 ? 'Ver resultado' : 'Siguiente';
    }

    function siguiente() {
      puntaje.push([2, 1, 0][elegido]);
      actual++;
      if (actual >= preguntas.length) {
        const total = puntaje.reduce((a, b) => a + b, 0);
        const r = resultados[total >= preguntas.length ? 'bien' : 'mal'];
        document.getElementById('paso').style.display = 'none';
        document.getElementById('pregunta').style.display = 'none';
        document.getElementById('opciones').style.display = 'none';
        document.getElementById('btn').style.display = 'none';
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('res-titulo').textContent = r.t;
        document.getElementById('res-desc').textContent = r.d;
      } else {
        mostrar();
      }
    }

    function reiniciar() {
      actual = 0; puntaje = []; elegido = null;
      ['paso','pregunta','opciones','btn'].forEach(id => document.getElementById(id).style.display = '');
      document.getElementById('resultado').style.display = 'none';
      mostrar();
    }

    mostrar();
  </script>

</body>
</html>
